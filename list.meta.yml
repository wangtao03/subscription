      Host: kejiland.freewarp.eu.org
    path: /snippets
sniffer:
  enable: true
  skip-domain:
  - Mijia Cloud
  - dlg.io.mi.com
  - +.apple.com
  sniff:
    HTTP:
      override-destination: true
      ports:
      - 80
      - 8080-8880
    TLS:
      ports:
      - 443
      - 8443
tcp-concurrent: true
unified-delay: true
